# render.yaml — Render Blueprint (Infrastructure as Code)
# Deploy all services with: Connect repo on Render Dashboard

services:
  # ── Pricing Engine ──────────────────────────────
  - type: web
    name: leadway-pricing-engine
    runtime: python
    region: oregon
    rootDir: pricing-engine
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"

  # ── Backend API ──────────────────────────────────
  - type: web
    name: member-verification-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: member-verification-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: BIOMETRIC_ENCRYPTION_KEY
        sync: false  # set manually in Render dashboard
      - key: PROGNOSIS_BASE_URL
        value: https://prognosis-api.leadwayhealth.com
      - key: PROGNOSIS_USERNAME
        sync: false  # set manually
      - key: PROGNOSIS_PASSWORD
        sync: false  # set manually
      - key: FUTRONIC_SDK_AVAILABLE
        value: "false"  # scanner runs on workstation, not server
      - key: REQUIRE_LFD
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONPATH
        value: /opt/render/project/src/backend

  # ── Frontend ─────────────────────────────────────
  - type: web
    name: member-verification-portal
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://member-verification-api.onrender.com/api/v1

# ── Database ─────────────────────────────────────
databases:
  - name: member-verification-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"
