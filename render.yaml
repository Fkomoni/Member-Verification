# render.yaml — Render Blueprint (Infrastructure as Code)
# Deploy all services with: Connect repo on Render Dashboard

services:
  # ── Backend API ──────────────────────────────────
  - type: web
    name: member-verification-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # already exists — set manually from existing DB
      - key: SECRET_KEY
        generateValue: true
      - key: BIOMETRIC_ENCRYPTION_KEY
        sync: false  # set manually in Render dashboard
      # Prognosis API
      - key: PROGNOSIS_BASE_URL
        value: https://prognosis-api.leadwayhealth.com
      - key: PROGNOSIS_USERNAME
        sync: false  # set manually
      - key: PROGNOSIS_PASSWORD
        sync: false  # set manually
      # Scanner (disabled on server)
      - key: FUTRONIC_SDK_AVAILABLE
        value: "false"
      - key: REQUIRE_LFD
        value: "true"
      # Authorization codes
      - key: AUTH_CODE_EXPIRY_HOURS
        value: "72"
      # Claims email (sent via Prognosis SendEmailAlert API)
      - key: CLAIMS_EMAIL
        sync: false  # set manually — email address to receive claim notifications
      # Python
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONPATH
        value: /opt/render/project/src/backend

  # ── Frontend ─────────────────────────────────────
  - type: web
    name: member-verification-portal
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://member-verification-api.onrender.com/api/v1

# ── Database ─────────────────────────────────────
# Using existing free-tier PostgreSQL (already provisioned).
# DATABASE_URL is set manually in the backend service environment.
