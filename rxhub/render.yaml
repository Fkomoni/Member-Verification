services:
  # ── RxHub Backend API ──────────────────────────────────────
  - type: web
    name: rxhub-backend
    runtime: python
    region: oregon
    rootDir: rxhub/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: rxhub-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PBM_API_BASE_URL
        sync: false
      - key: PBM_API_KEY
        sync: false
      - key: SMS_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
    healthCheckPath: /api/health
    plan: free

  # ── RxHub Admin Portal ─────────────────────────────────────
  - type: web
    name: rxhub-admin
    runtime: static
    rootDir: rxhub/admin-portal
    buildCommand: npm install && npm run build
    staticPublishPath: build
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false
    plan: free

databases:
  - name: rxhub-db
    plan: free
    databaseName: rxhub
    postgresMajorVersion: "16"
    region: oregon
